name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit + RBAC boundary tests
        run: npm test

      - name: Static RBAC route map
        run: npm run verify:rbac

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders — real secrets live in hosting env / secrets manager
          NEXT_PUBLIC_FIREBASE_API_KEY: build-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: example.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: example
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: example.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "0"
          FIREBASE_ADMIN_PROJECT_ID: example
          FIREBASE_ADMIN_CLIENT_EMAIL: build@example.com
          FIREBASE_ADMIN_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIB\n-----END PRIVATE KEY-----\n"
          SESSION_SECRET: ci-build-session-secret-not-for-production
