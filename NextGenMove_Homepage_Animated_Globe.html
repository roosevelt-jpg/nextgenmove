<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FAFAF7; font-family: 'Inter', sans-serif; }

  .hero {
    border-radius: 20px;
    padding: 70px 60px;
    background: linear-gradient(115deg, #2E2768 0%, #4B3F9C 38%, #9A6A3C 78%, #C97A2E 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .hero-left { position: relative; z-index: 2; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 4px;
    color: #E8D9BE; margin-bottom: 20px;
  }
  h1 {
    font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1.15; color: #FFFDF8; font-weight: 500;
  }
  h1 em {
    font-style: italic; color: #F4D9A8; display: block; font-size: 60px; margin-top: 4px;
  }
  .sub {
    max-width: 440px; font-size: 15.5px; line-height: 1.7; color: #E4DFF0; margin: 22px 0 32px;
  }
  .ctas { display: flex; gap: 12px; }
  .btn-primary {
    background: #FFFDF8; color: #4B3F9C; border: none; padding: 14px 24px;
    border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.08); color: #FFFDF8; border: 1px solid rgba(255,253,248,0.4); padding: 14px 24px;
    border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer;
  }

  .globe-wrap { position: relative; z-index: 1; }

  .graticule { fill: none; stroke: rgba(255,253,248,0.16); stroke-width: 1; }
  .globe-outline { fill: rgba(255,253,248,0.03); stroke: rgba(255,253,248,0.22); stroke-width: 1; }

  .globe-slowspin { transform-origin: 250px 250px; animation: spin 40s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .route-arc {
    fill: none; stroke: #F4D9A8; stroke-width: 1.6; stroke-linecap: round;
    stroke-dasharray: 6 8; opacity: 0.85;
    animation: flow 2.4s linear infinite;
  }
  @keyframes flow { to { stroke-dashoffset: -140; } }

  .hub-dot { fill: #FFFDF8; }
  .hub-ring {
    fill: none; stroke: #F4D9A8; stroke-width: 1.5; opacity: 0.8;
    transform-origin: center; animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse {
    0%   { r: 8;  opacity: 0.9; stroke-width: 2; }
    100% { r: 34; opacity: 0;   stroke-width: 0.5; }
  }

  .city-dot { fill: #F4D9A8; }

  .traveler {
    fill: #FFFDF8;
  }

  .avatar-bubble {
    animation: bob 3.6s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0px); }
    50%      { transform: translateY(-7px); }
  }
  .avatar-circle { fill: #FFFDF8; }
  .avatar-text {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; fill: #4B3F9C;
    text-anchor: middle; dominant-baseline: central;
  }
  .avatar-label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #E8D9BE;
    text-anchor: middle; letter-spacing: 0.5px;
  }

  .dxb-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; fill: #FFFDF8;
    text-anchor: middle; letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="hero">

  <div class="hero-left">
    <div class="eyebrow">RELOCATION, ENGINEERED</div>
    <h1>Your next step,<em>engineered.</em></h1>
    <div class="sub">
      NextGen Move pairs you with a personal coach, a vetted employer, and a
      visa-ready path abroad &mdash; from first application to first day.
    </div>
    <div class="ctas">
      <button class="btn-primary">Explore open roles</button>
      <button class="btn-ghost">I'm hiring &#8594;</button>
    </div>
  </div>

  <div class="globe-wrap">
    <svg viewBox="0 0 500 500" width="100%" height="480">

      <g class="globe-slowspin">
        <circle class="globe-outline" cx="250" cy="250" r="190"/>
        <ellipse class="graticule" cx="250" cy="250" rx="190" ry="70"/>
        <ellipse class="graticule" cx="250" cy="250" rx="190" ry="130"/>
        <ellipse class="graticule" cx="250" cy="250" rx="70"  ry="190"/>
        <ellipse class="graticule" cx="250" cy="250" rx="130" ry="190"/>
      </g>

      <!-- route arcs: 6 origin cities curving in to the Dubai hub -->
      <path id="r1" class="route-arc" d="M 80,140  Q 160,120 250,250"/>
      <path id="r2" class="route-arc" d="M 70,250  Q 150,240 250,250" style="animation-delay:-0.4s"/>
      <path id="r3" class="route-arc" d="M 90,360  Q 160,320 250,250" style="animation-delay:-0.8s"/>
      <path id="r4" class="route-arc" d="M 420,120 Q 340,160 250,250" style="animation-delay:-1.2s"/>
      <path id="r5" class="route-arc" d="M 440,260 Q 350,255 250,250" style="animation-delay:-1.6s"/>
      <path id="r6" class="route-arc" d="M 410,380 Q 340,320 250,250" style="animation-delay:-2.0s"/>

      <!-- traveler dots gliding along each route -->
      <circle class="traveler" r="3"><animateMotion dur="2.4s" repeatCount="indefinite" begin="0s"    rotate="auto"><mpath href="#r1"/></animateMotion></circle>
      <circle class="traveler" r="3"><animateMotion dur="2.6s" repeatCount="indefinite" begin="0.5s"  rotate="auto"><mpath href="#r2"/></animateMotion></circle>
      <circle class="traveler" r="3"><animateMotion dur="2.2s" repeatCount="indefinite" begin="1.0s"  rotate="auto"><mpath href="#r3"/></animateMotion></circle>
      <circle class="traveler" r="3"><animateMotion dur="2.5s" repeatCount="indefinite" begin="0.2s"  rotate="auto"><mpath href="#r4"/></animateMotion></circle>
      <circle class="traveler" r="3"><animateMotion dur="2.3s" repeatCount="indefinite" begin="0.8s"  rotate="auto"><mpath href="#r5"/></animateMotion></circle>
      <circle class="traveler" r="3"><animateMotion dur="2.7s" repeatCount="indefinite" begin="1.3s"  rotate="auto"><mpath href="#r6"/></animateMotion></circle>

      <!-- Dubai hub -->
      <circle class="hub-ring" cx="250" cy="250" r="8"/>
      <circle class="hub-ring" cx="250" cy="250" r="8" style="animation-delay:-1.1s"/>
      <circle class="hub-dot" cx="250" cy="250" r="6"/>
      <text class="dxb-label" x="250" y="278">DXB</text>

      <!-- origin city dots -->
      <circle class="city-dot" cx="80" cy="140" r="3.5"/>
      <circle class="city-dot" cx="70" cy="250" r="3.5"/>
      <circle class="city-dot" cx="90" cy="360" r="3.5"/>
      <circle class="city-dot" cx="420" cy="120" r="3.5"/>
      <circle class="city-dot" cx="440" cy="260" r="3.5"/>
      <circle class="city-dot" cx="410" cy="380" r="3.5"/>

      <!-- floating candidate avatars near their home city -->
      <g class="avatar-bubble" style="animation-delay:0s">
        <circle class="avatar-circle" cx="80" cy="105" r="17"/>
        <text class="avatar-text" x="80" y="106">SK</text>
        <text class="avatar-label" x="80" y="132">AMSTERDAM</text>
      </g>
      <g class="avatar-bubble" style="animation-delay:-1.2s">
        <circle class="avatar-circle" cx="55" cy="250" r="17"/>
        <text class="avatar-text" x="55" y="251">JL</text>
        <text class="avatar-label" x="55" y="277">BERLIN</text>
      </g>
      <g class="avatar-bubble" style="animation-delay:-2.4s">
        <circle class="avatar-circle" cx="78" cy="398" r="17"/>
        <text class="avatar-text" x="78" y="399">AM</text>
        <text class="avatar-label" x="78" y="425">CAIRO</text>
      </g>
      <g class="avatar-bubble" style="animation-delay:-0.6s">
        <circle class="avatar-circle" cx="430" cy="85" r="17"/>
        <text class="avatar-text" x="430" y="86">PV</text>
        <text class="avatar-label" x="430" y="112">WARSAW</text>
      </g>
      <g class="avatar-bubble" style="animation-delay:-1.8s">
        <circle class="avatar-circle" cx="465" cy="260" r="17"/>
        <text class="avatar-text" x="465" y="261">LB</text>
        <text class="avatar-label" x="465" y="287">PARIS</text>
      </g>
      <g class="avatar-bubble" style="animation-delay:-3s">
        <circle class="avatar-circle" cx="425" cy="405" r="17"/>
        <text class="avatar-text" x="425" y="406">CN</text>
        <text class="avatar-label" x="425" y="432">LISBON</text>
      </g>

    </svg>
  </div>

</div>

</body>
</html>
